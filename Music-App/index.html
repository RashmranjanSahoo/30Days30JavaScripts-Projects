<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music-App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/9640d4bf34.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="music-player">
          <nav>
            <div class="circle">
                <i class="fa-solid fa-angle-left"></i>
            </div>
             <div class="circle">
                <i class="fa-solid fa-bars"></i>
            </div>
          </nav>
          <img src="Raabta-Hindi-2017-500x500.jpg" class="song-img">
          <h1>Raabta-2017</h1>
          <p>Song · Pritam, Arijit Singh, Amitabh Bhattacharya </p>
          <audio  id="song" >
            <source src="Ik Vaari Aa Full Song _ Raabta _ Sushant Singh Rajput _ Kriti Sanon _ Pritam Arijit Singh Amitabh B(MP3_128K).mp3" type="audio/mp3">
          </audio>
          <input type="range" value="0" id="progress">
          <div class="controls">
            <div><i class="fa-solid fa-backward"></i></div>
            <div onclick="playPause()"><i class="fa-solid fa-play" id="ctricon"></i></div>
            <div><i class="fa-solid fa-forward"></i></div> 
          </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
