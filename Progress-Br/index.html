<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress-Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="skill">
        <div class="outer">
            <div class="inner">
                <div id="html-number">0%</div>
            </div>
            
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160px" height="160px">
         <defs>
            <linearGradient id="GradientColor">
               <stop offset="0%" stop-color="#e91e63" />
               <stop offset="100%" stop-color="#673ab7" />
            </linearGradient>
         </defs>
         <circle class="html-circle" cx="80" cy="80" r="70" stroke-linecap="round" />
        </svg>
        <h2>HTML</h2>
    </div>
    <div class="skill">
        <div class="outer">
            <div class="inner">
                <div id="css-number">0%</div>
            </div>
            
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160px" height="160px">
         <defs>
            <linearGradient id="GradientColor">
               <stop offset="0%" stop-color="#e91e63" />
               <stop offset="100%" stop-color="#673ab7" />
            </linearGradient>
         </defs>
         <circle class="css-circle" cx="80" cy="80" r="70" stroke-linecap="round" />
        </svg>
        <h2>CSS</h2>
    </div>
    <div class="skill">
        <div class="outer">
            <div class="inner">
                <div id="js-number">0%</div>
            </div>
            
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160px" height="160px">
         <defs>
            <linearGradient id="GradientColor">
               <stop offset="0%" stop-color="#e91e63" />
               <stop offset="100%" stop-color="#673ab7" />
            </linearGradient>
         </defs>
         <circle class="js-circle" cx="80" cy="80" r="70" stroke-linecap="round" />
        </svg>
        <h2>JAVASCRIPT</h2>
    </div>
    <script src="app.js"></script>
</body>
</html>
