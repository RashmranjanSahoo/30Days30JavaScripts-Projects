
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Paragraph Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Random Paragraph Generator</h1>

        <div class="input-box">
            <input type="number" id="count" min="1" max="10" placeholder="Enter number of paragraphs">
            <button onclick="generateParagraphs()">
                Generate
            </button>
        </div>

        <h3 id="topic"></h3>

        <div id="output"></div>

    </div>
    <script src="app.js"></script>
</body>

</html>
